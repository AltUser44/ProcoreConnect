default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>

development:
  <<: *default
  database: procoreconnect_development

test:
  <<: *default
  database: procoreconnect_test

production:
  <<: *default
  database: procoreconnect_production
  username: <%= ENV.fetch("DATABASE_USERNAME", "procoreconnect") %>
  password: <%= ENV["PROCORECONNECT_DATABASE_PASSWORD"] %>
