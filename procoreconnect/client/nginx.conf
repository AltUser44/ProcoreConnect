server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed assets, no-cache for the SPA shell so deploys go live.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Proxy API + webhook requests to the Rails service. The hostname `web`
  # matches the docker-compose service name; in non-compose deploys override
  # via a build of nginx.conf or a sidecar reverse proxy.
  location /api/ {
    proxy_pass         http://web:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA fallback - any unknown path serves index.html so React Router takes over.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  # Surface a small health endpoint for orchestrators / load balancers.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
