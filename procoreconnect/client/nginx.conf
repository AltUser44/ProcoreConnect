server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # docker embedded dns: re-resolve `web` on each request (recreate-safe)
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Long cache for hashed assets, no-cache for the SPA shell so deploys go live.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # service name `web` = docker network dns
  location /api/ {
    # variable + resolver = not stuck on old web ip after container recycle
    set $rails_upstream "web:3000";
    proxy_pass         http://$rails_upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA fallback - any unknown path serves index.html so React Router takes over.
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ /index.html;
  }

  # Surface a small health endpoint for orchestrators / load balancers.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
